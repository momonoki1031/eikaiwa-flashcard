<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#01696f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="英会話">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<title>英会話フラッシュカード</title>
<style>
:root {
  /* Surfaces — warm cream */
  --color-bg: #f7f6f2;
  --color-surface: #ffffff;
  --color-surface-2: #fbfbf9;
  --color-surface-offset: #f3f0ec;
  --color-border: #d4d1ca;
  --color-divider: #e6e4df;
  /* Text */
  --color-text: #28251d;
  --color-text-muted: #7a7974;
  --color-text-faint: #bab9b4;
  --color-text-inverse: #f9f8f4;
  /* Accent — teal */
  --color-primary: #01696f;
  --color-primary-hover: #0c4e54;
  --color-primary-highlight: #cedcd8;
  /* Semantic */
  --color-success: #437a22;
  --color-success-bg: #e3ecd8;
  --color-error: #a12c7b;
  --color-error-bg: #f3dfec;
  --color-warning: #b07a00;
  --color-warning-bg: #f2e9d0;
  /* Radius */
  --radius-sm: 0.375rem;
  --radius-md: 0.625rem;
  --radius-lg: 1rem;
  --radius-xl: 1.5rem;
  --radius-full: 9999px;
  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(40, 37, 29, 0.06);
  --shadow-md: 0 4px 16px rgba(40, 37, 29, 0.08);
  --shadow-lg: 0 12px 32px rgba(40, 37, 29, 0.14);
  /* Safe area */
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
[data-theme="dark"] {
  --color-bg: #171614;
  --color-surface: #201f1d;
  --color-surface-2: #262523;
  --color-surface-offset: #2a2927;
  --color-border: #393836;
  --color-divider: #2b2a28;
  --color-text: #e4e3e0;
  --color-text-muted: #8f8e8a;
  --color-text-faint: #5a5957;
  --color-text-inverse: #1a1918;
  --color-primary: #4fa8b3;
  --color-primary-hover: #6dc0cb;
  --color-primary-highlight: #21363a;
  --color-success: #6daa45;
  --color-success-bg: #2e3a28;
  --color-error: #d163a7;
  --color-error-bg: #3e2434;
  --color-warning: #d19900;
  --color-warning-bg: #3a3020;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,.4);
  --shadow-lg: 0 12px 32px rgba(0,0,0,.5);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme]) {
    --color-bg: #171614;
    --color-surface: #201f1d;
    --color-surface-2: #262523;
    --color-surface-offset: #2a2927;
    --color-border: #393836;
    --color-divider: #2b2a28;
    --color-text: #e4e3e0;
    --color-text-muted: #8f8e8a;
    --color-text-faint: #5a5957;
    --color-text-inverse: #1a1918;
    --color-primary: #4fa8b3;
    --color-primary-hover: #6dc0cb;
    --color-primary-highlight: #21363a;
    --color-success: #6daa45;
    --color-success-bg: #2e3a28;
    --color-error: #d163a7;
    --color-error-bg: #3e2434;
    --color-warning: #d19900;
    --color-warning-bg: #3a3020;
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; -webkit-font-smoothing: antialiased; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", "Helvetica Neue", sans-serif;
  font-size: 16px;
  line-height: 1.6;
  color: var(--color-text);
  background: var(--color-bg);
  min-height: 100dvh;
  overscroll-behavior: none;
  -webkit-user-select: none;
  user-select: none;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

/* ============== Layout ============== */
.app {
  max-width: 640px;
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  position: sticky;
  top: var(--safe-top);
  background: color-mix(in srgb, var(--color-bg) 85%, transparent);
  backdrop-filter: saturate(1.8) blur(16px);
  -webkit-backdrop-filter: saturate(1.8) blur(16px);
  z-index: 10;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border-bottom: 1px solid var(--color-divider);
}
.header-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.header-actions { display: flex; gap: 6px; }
.icon-btn {
  width: 40px; height: 40px;
  border-radius: var(--radius-full);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--color-text-muted);
  transition: background 0.15s, color 0.15s;
}
.icon-btn:hover, .icon-btn:active {
  background: var(--color-surface-offset);
  color: var(--color-text);
}
.icon-btn svg { width: 22px; height: 22px; }

/* ============== Home: deck list ============== */
.home {
  padding: 16px;
  flex: 1;
}
.home-hero {
  padding: 16px 4px 24px;
}
.home-title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}
.home-subtitle {
  color: var(--color-text-muted);
  font-size: 14px;
}

.stats-card {
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  padding: 16px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--color-divider);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.stat { text-align: center; }
.stat-value {
  font-size: 22px;
  font-weight: 700;
  color: var(--color-primary);
  font-variant-numeric: tabular-nums;
}
.stat-label {
  font-size: 11px;
  color: var(--color-text-muted);
  margin-top: 2px;
  letter-spacing: 0.02em;
}

.section-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--color-text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin: 20px 4px 10px;
}

.deck-list { display: flex; flex-direction: column; gap: 10px; }
.deck-card {
  background: var(--color-surface);
  border: 1px solid var(--color-divider);
  border-radius: var(--radius-lg);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  text-align: left;
  width: 100%;
}
.deck-card:active {
  transform: scale(0.98);
  border-color: var(--color-primary);
}
.deck-icon {
  width: 44px; height: 44px;
  border-radius: var(--radius-md);
  background: var(--color-primary-highlight);
  color: var(--color-primary);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-weight: 700;
  font-size: 18px;
}
.deck-info { flex: 1; min-width: 0; }
.deck-name {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 4px;
}
.deck-meta {
  font-size: 12px;
  color: var(--color-text-muted);
  display: flex;
  gap: 10px;
}
.deck-meta-item { display: inline-flex; gap: 3px; align-items: center; }
.dot-due { color: var(--color-error); font-weight: 700; }
.dot-new { color: var(--color-primary); font-weight: 700; }
.deck-arrow { color: var(--color-text-faint); flex-shrink: 0; }

/* ============== Study view ============== */
.study {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 8px 16px 16px;
}
.progress-bar {
  height: 4px;
  background: var(--color-divider);
  border-radius: var(--radius-full);
  overflow: hidden;
  margin: 8px 0 20px;
}
.progress-fill {
  height: 100%;
  background: var(--color-primary);
  transition: width 0.3s ease;
  border-radius: var(--radius-full);
}
.study-meta {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--color-text-muted);
  margin-bottom: 14px;
  font-variant-numeric: tabular-nums;
}

/* Card */
.card-stage {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 1600px;
  min-height: 340px;
  padding: 10px 0;
}
.card {
  width: 100%;
  aspect-ratio: 3 / 4;
  max-height: calc(100dvh - 320px);
  max-width: 380px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(.2,.8,.2,1);
  cursor: pointer;
}
.card.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: var(--radius-xl);
  background: var(--color-surface);
  box-shadow: var(--shadow-md);
  border: 1px solid var(--color-divider);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 28px 24px;
  text-align: center;
}
.card-face-back {
  transform: rotateY(180deg);
  background: var(--color-primary-highlight);
  border-color: var(--color-primary);
}
.card-lang {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--color-text-muted);
  position: absolute;
  top: 18px; left: 20px;
}
.card-face-back .card-lang { color: var(--color-primary); }
.card-text {
  font-size: clamp(20px, 5.5vw, 28px);
  font-weight: 600;
  line-height: 1.5;
  letter-spacing: -0.01em;
  max-height: 100%;
  overflow-y: auto;
  overscroll-behavior: contain;
  word-break: break-word;
}
.card-face-back .card-text {
  color: var(--color-primary-hover);
  font-style: normal;
}
[data-theme="dark"] .card-face-back .card-text { color: #d0f0f4; }
@media (prefers-color-scheme: dark) {
  :root:not([data-theme]) .card-face-back .card-text { color: #d0f0f4; }
}
.tap-hint {
  position: absolute;
  bottom: 16px;
  font-size: 11px;
  color: var(--color-text-faint);
  letter-spacing: 0.05em;
}

/* Answer buttons */
.answer-bar {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-top: 18px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.answer-bar.visible { opacity: 1; pointer-events: auto; }
.ans-btn {
  padding: 10px 6px 10px;
  border-radius: var(--radius-md);
  border: 1px solid transparent;
  font-size: 13px;
  font-weight: 700;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  transition: transform 0.1s, filter 0.1s;
  min-height: 72px;
  line-height: 1.25;
}
.ans-btn:active { transform: scale(0.96); filter: brightness(0.96); }
.ans-btn .days {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 0.01em;
  margin-top: 2px;
}
.ans-btn .hint {
  font-size: 10.5px;
  font-weight: 500;
  opacity: 0.72;
  letter-spacing: 0;
}
.ans-again { background: var(--color-error-bg); color: var(--color-error); }
.ans-good { background: var(--color-warning-bg); color: var(--color-warning); }
.ans-easy { background: var(--color-success-bg); color: var(--color-success); }

/* Word-gloss tokens (clickable English words on study / browse) */
.gloss-en {
  /* preserve natural text layout + word breaks */
  display: inline;
  line-height: 1.55;
}
.gloss-tok {
  display: inline-block;
  cursor: pointer;
  border-radius: 4px;
  padding: 0 1px;
  transition: background 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.gloss-tok.has-gloss {
  border-bottom: 1.5px dotted var(--color-accent);
  padding-bottom: 0;
}
.gloss-tok.has-gloss:active,
.gloss-tok.has-gloss.active {
  background: color-mix(in srgb, var(--color-accent) 18%, transparent);
}
.gloss-tok.plain { cursor: default; }

/* Gloss popover */
.gloss-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 90;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
}
.gloss-backdrop.visible { opacity: 1; pointer-events: auto; }
.gloss-popover {
  position: fixed;
  left: 50%;
  bottom: 0;
  transform: translate(-50%, 100%);
  width: min(480px, calc(100vw - 24px));
  background: var(--color-surface);
  border-top-left-radius: 16px;
  border-top-right-radius: 16px;
  box-shadow: 0 -8px 24px rgba(0,0,0,0.18);
  z-index: 91;
  padding: 16px 18px 22px;
  transition: transform 0.22s cubic-bezier(0.2, 0.7, 0.2, 1);
  max-height: 70vh;
  overflow-y: auto;
}
.gloss-popover.visible {
  transform: translate(-50%, 0);
}
.gloss-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.gloss-word {
  font-size: 22px;
  font-weight: 700;
  color: var(--color-text);
  letter-spacing: 0.01em;
}
.gloss-pron {
  display: flex;
  gap: 10px;
  align-items: baseline;
  flex-wrap: wrap;
}
.gloss-ipa {
  font-size: 15px;
  color: var(--color-text-muted);
  font-family: ui-serif, Georgia, serif;
  font-style: italic;
}
.gloss-kana {
  font-size: 14px;
  color: var(--color-text-faint);
}
.gloss-meaning {
  font-size: 17px;
  font-weight: 600;
  color: var(--color-accent);
  margin: 4px 0 6px;
}
.gloss-nuance {
  font-size: 13.5px;
  color: var(--color-text-muted);
  line-height: 1.5;
}
.gloss-close {
  position: absolute;
  top: 10px;
  right: 10px;
  background: var(--color-surface-offset);
  border: none;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--color-text-muted);
  cursor: pointer;
}
.gloss-empty {
  font-size: 13px;
  color: var(--color-text-faint);
  padding: 6px 0;
}

/* 7-day schedule heatmap */
.schedule-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 14px 14px 12px;
  margin: 0 0 14px;
}
.schedule-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}
.schedule-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text);
}
.schedule-sub {
  font-size: 11px;
  color: var(--color-text-faint);
}
.schedule-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
.schedule-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.schedule-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--color-text-faint);
  letter-spacing: 0.02em;
}
.schedule-label.today { color: var(--color-accent); }
.schedule-bar {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 6px;
  background: var(--color-surface-offset);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--color-text-muted);
  position: relative;
  min-height: 28px;
}
.schedule-bar[data-level="0"] { background: var(--color-surface-offset); color: var(--color-text-faint); }
.schedule-bar[data-level="1"] { background: color-mix(in srgb, var(--color-accent) 15%, var(--color-surface)); color: var(--color-accent); }
.schedule-bar[data-level="2"] { background: color-mix(in srgb, var(--color-accent) 30%, var(--color-surface)); color: var(--color-accent); }
.schedule-bar[data-level="3"] { background: color-mix(in srgb, var(--color-accent) 55%, var(--color-surface)); color: #fff; }
.schedule-bar[data-level="4"] { background: var(--color-accent); color: #fff; }
.schedule-bar.today-cell { outline: 2px solid var(--color-accent); outline-offset: 1px; }

.flip-cta {
  margin-top: 18px;
  padding: 14px;
  background: var(--color-primary);
  color: var(--color-text-inverse);
  border-radius: var(--radius-md);
  font-size: 15px;
  font-weight: 600;
  width: 100%;
  transition: background 0.15s, transform 0.1s;
}
.flip-cta:active { transform: scale(0.98); background: var(--color-primary-hover); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--color-text-muted);
}
.empty-state-icon {
  font-size: 48px;
  margin-bottom: 12px;
}
.empty-state-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--color-text);
  margin-bottom: 6px;
}
.empty-state-body { font-size: 14px; line-height: 1.6; }

/* Loading */
.loading {
  text-align: center;
  padding: 80px 20px;
  color: var(--color-text-muted);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--color-text);
  color: var(--color-text-inverse);
  padding: 10px 16px;
  border-radius: var(--radius-full);
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  transition: transform 0.25s, opacity 0.25s;
  pointer-events: none;
  z-index: 100;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Settings sheet */
.sheet-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  z-index: 50;
}
.sheet-backdrop.visible { opacity: 1; pointer-events: auto; }
.sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--color-surface);
  border-top-left-radius: var(--radius-xl);
  border-top-right-radius: var(--radius-xl);
  transform: translateY(100%);
  transition: transform 0.25s cubic-bezier(.2,.8,.2,1);
  z-index: 51;
  padding: 8px 20px calc(20px + var(--safe-bottom));
  max-height: 85vh;
  overflow-y: auto;
}
.sheet.open { transform: translateY(0); }
.sheet-handle {
  width: 40px; height: 4px;
  background: var(--color-divider);
  border-radius: var(--radius-full);
  margin: 8px auto 16px;
}
.sheet h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.settings-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--color-divider);
}
.settings-item:last-child { border-bottom: none; }
.settings-label { font-size: 15px; }
.settings-desc { font-size: 12px; color: var(--color-text-muted); margin-top: 2px; }
.settings-btn {
  padding: 8px 16px;
  background: var(--color-surface-offset);
  color: var(--color-text);
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 500;
}
.settings-btn.danger { background: var(--color-error-bg); color: var(--color-error); }

/* Back button */
.back-btn {
  display: flex; align-items: center; gap: 4px;
  color: var(--color-primary);
  font-size: 15px;
  padding: 6px 10px 6px 4px;
  margin-left: -4px;
}

/* ============== Browse view ============== */
.browse { padding: 12px 16px 24px; flex: 1; }
.browse-controls {
  position: sticky;
  top: calc(var(--safe-top) + 58px);
  z-index: 5;
  background: var(--color-bg);
  padding: 8px 0 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.search-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
.search-wrap svg {
  position: absolute;
  left: 12px;
  color: var(--color-text-faint);
  width: 18px; height: 18px;
  pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 12px 14px 12px 38px;
  border-radius: var(--radius-md);
  border: 1px solid var(--color-divider);
  background: var(--color-surface);
  color: var(--color-text);
  font-size: 15px;
  outline: none;
  -webkit-appearance: none;
}
.search-input:focus { border-color: var(--color-primary); }
.search-clear {
  position: absolute;
  right: 10px;
  color: var(--color-text-faint);
  padding: 4px;
  display: none;
}
.search-clear.visible { display: block; }
.chip-row {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 2px;
  flex: 1 1 auto;
  min-width: 0;
}
.chip-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 7px 14px;
  border-radius: var(--radius-full);
  border: 1px solid var(--color-divider);
  background: var(--color-surface);
  color: var(--color-text-muted);
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
}
.chip.active {
  background: var(--color-primary);
  color: var(--color-text-inverse);
  border-color: var(--color-primary);
}
.browse-summary {
  font-size: 12px;
  color: var(--color-text-muted);
  margin: 8px 4px 10px;
  font-variant-numeric: tabular-nums;
}
.card-list { display: flex; flex-direction: column; gap: 8px; }
.list-item {
  background: var(--color-surface);
  border: 1px solid var(--color-divider);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  text-align: left;
  width: 100%;
  transition: border-color 0.15s, background 0.15s;
}
.list-item:active { border-color: var(--color-primary); background: var(--color-surface-offset); }
.list-jp { font-size: 15px; line-height: 1.5; color: var(--color-text); word-break: break-word; }
.list-en { font-size: 14px; line-height: 1.5; color: var(--color-text-muted); word-break: break-word; display: none; }
.list-item.revealed .list-en { display: block; color: var(--color-primary-hover); font-weight: 500; }
[data-theme="dark"] .list-item.revealed .list-en { color: #7fd0da; }
@media (prefers-color-scheme: dark) {
  :root:not([data-theme]) .list-item.revealed .list-en { color: #7fd0da; }
}
.list-item .list-deck {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--color-text-faint);
  text-transform: uppercase;
}
.list-empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--color-text-muted);
  font-size: 14px;
}
.reveal-all-btn {
  padding: 7px 12px;
  border-radius: var(--radius-md);
  background: var(--color-surface);
  border: 1px solid var(--color-divider);
  color: var(--color-text-muted);
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
}
.reveal-all-btn.active {
  background: var(--color-primary-highlight);
  color: var(--color-primary);
  border-color: var(--color-primary);
}
.browse-actions-row {
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: space-between;
}

/* Hidden */
.hidden { display: none !important; }

/* Tablet+ */
@media (min-width: 768px) {
  .card-stage { min-height: 420px; }
}

<body>
<div class="app" id="app">
  <!-- Header -->
  <header class="header" id="header">
    <div id="headerLeft">
      <div class="header-title">英会話フラッシュカード</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="themeBtn" aria-label="テーマ切替" title="テーマ切替">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg>
      </button>
      <button class="icon-btn" id="settingsBtn" aria-label="設定" title="設定">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.2.38.52.69.9.9H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
    </div>
  </header>

  <!-- Home view -->
  <section id="homeView" class="home">
    <div class="home-hero">
      <h1 class="home-title">今日も学習しよう</h1>
      <p class="home-subtitle" id="homeSubtitle">読み込み中…</p>
    </div>

    <div class="stats-card">
      <div class="stat">
        <div class="stat-value" id="statDue">0</div>
        <div class="stat-label">今日の復習</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statNew">0</div>
        <div class="stat-label">新しいカード</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statStreak">0</div>
        <div class="stat-label">連続日数</div>
      </div>
    </div>

    <div class="schedule-card" id="scheduleCard">
      <div class="schedule-head">
        <div class="schedule-title">復習スケジュール</div>
        <div class="schedule-sub">忘却曲線に基づく、今後7日間の予定</div>
      </div>
      <div class="schedule-row" id="scheduleRow"></div>
    </div>

    <button class="deck-card" id="browseEntry" style="margin-bottom: 8px;">
      <div class="deck-icon" style="background: var(--color-surface-offset); color: var(--color-text-muted);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
      </div>
      <div class="deck-info">
        <div class="deck-name">予習・一覧を見る</div>
        <div class="deck-meta"><span class="deck-meta-item">全カードを日本語＋英文で確認</span></div>
      </div>
      <svg class="deck-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>

    <div class="section-label">デッキ</div>
    <div class="deck-list" id="deckList"></div>
  </section>

  <!-- Browse view -->
  <section id="browseView" class="browse hidden">
    <div class="browse-controls">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg>
        <input id="searchInput" class="search-input" type="search" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="日本語・英文を検索">
        <button class="search-clear" id="searchClear" aria-label="クリア">

        </button>
      </div>
      <div class="browse-actions-row">
        <div class="chip-row" id="chipRow"></div>
        <button class="reveal-all-btn" id="revealAllBtn" aria-label="英訳を一括表示">英訳<br>表示</button>
      </div>
    </div>
    <div class="browse-summary" id="browseSummary">—</div>
    <div class="card-list" id="cardList"></div>
  </section>

  <!-- Study view -->
  <section id="studyView" class="study hidden">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="study-meta">
      <span id="studyDeckName">—</span>
      <span id="studyCounter">0 / 0</span>
    </div>
    <div class="card-stage">
      <div class="card" id="card">
        <div class="card-face card-face-front">
          <div class="card-lang">日本語</div>
          <div class="card-text" id="cardFront">—</div>
          <div class="tap-hint">タップして英訳を見る</div>
        </div>
        <div class="card-face card-face-back">
          <div class="card-lang">ENGLISH</div>
          <div class="card-text" id="cardBack">—</div>
          <div class="tap-hint">回答を選択 ↓</div>
        </div>
      </div>
    </div>
    <button class="flip-cta" id="flipCta">答えを見る</button>
    <div class="answer-bar" id="answerBar">
      <button class="ans-btn ans-again" data-rating="again">
        <span>もう一度</span>
        <span class="days" id="dueAgain">10分</span>
        <span class="hint">忘れた</span>
      </button>
      <button class="ans-btn ans-good" data-rating="good">
        <span>普通</span>
        <span class="days" id="dueGood">—</span>
        <span class="hint">思い出せた</span>
      </button>
      <button class="ans-btn ans-easy" data-rating="easy">
        <span>簡単</span>
        <span class="days" id="dueEasy">—</span>
        <span class="hint">余裕で正解</span>
      </button>
    </div>
  </section>

  <!-- Settings sheet -->
  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="sheet" id="settingsSheet">
    <div class="sheet-handle"></div>
    <h2>設定</h2>
    <div class="settings-item">
      <div>
        <div class="settings-label">一日の新規カード上限</div>
        <div class="settings-desc">各デッキの新しいカード数 / 日</div>
      </div>
      <select id="newCardLimit" class="settings-btn">
        <option value="5">5枚</option>
        <option value="10" selected>10枚</option>
        <option value="20">20枚</option>
        <option value="30">30枚</option>
        <option value="50">50枚</option>
      </select>
    </div>
    <div class="settings-item">
      <div>
        <div class="settings-label">一日の復習上限</div>
        <div class="settings-desc">期日が来たカードの最大学習数 / デッキ</div>
      </div>
      <select id="reviewLimit" class="settings-btn">
        <option value="50">50枚</option>
        <option value="100" selected>100枚</option>
        <option value="200">200枚</option>
        <option value="9999">無制限</option>
      </select>
    </div>
    <div class="settings-item">
      <div>
        <div class="settings-label">進捗のエクスポート</div>
        <div class="settings-desc">バックアップ用にJSONを保存</div>
      </div>
      <button class="settings-btn" id="exportBtn">書き出し</button>
    </div>
    <div class="settings-item">
      <div>
        <div class="settings-label">進捗のインポート</div>
        <div class="settings-desc">バックアップを復元</div>
      </div>
      <button class="settings-btn" id="importBtn">読み込み</button>
      <input type="file" id="importFile" accept="application/json" style="display:none">
    </div>
    <div class="settings-item">
      <div>
        <div class="settings-label">すべての進捗を初期化</div>
        <div class="settings-desc">学習履歴と連続日数を削除</div>
      </div>
      <button class="settings-btn danger" id="resetBtn">初期化</button>
    </div>
    <div class="settings-item" style="border:none; justify-content: center; color: var(--color-text-faint); font-size: 12px;">
      <span>合計<span id="totalCardCount">—</span>枚のカード</span>
    </div>
  </div>
</div>

// ============== State & Storage ==============
const STORAGE_KEY = 'flashcards_v1';
const DAY_MS = 86400000;

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const s = JSON.parse(raw);
    return Object.assign(defaultState(), s);
  } catch(e) { return defaultState(); }
}
function defaultState() {
  return {
    progress: {},       // cardId -> { ef, interval, due, reps, lapses, learning }
    newToday: {},       // deck -> { date, count }
    lastStudyDate: null,
    streak: 0,
    newCardLimit: 10,
    reviewLimit: 100,   // 復習の1日当たり上限
    introducedCards: {} // deck -> [cardIndex, ...] cards already introduced
  };
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

let state = loadState();
let cards = [];           // all cards
let decks = {};           // deckName -> [cardId, ...]
let current = {           // active study session
  deck: null, queue: [], index: 0, showingBack: false, currentCardId: null
};

// ============== Data loading ==============
async function loadCards() {
  try {
    let data;
    if (window.__EMBEDDED_CARDS__ && Array.isArray(window.__EMBEDDED_CARDS__)) {
      data = window.__EMBEDDED_CARDS__;
    } else {
      const r = await fetch('cards.json', {cache: 'no-cache'});
      data = await r.json();
    }
    cards = data.map((c, i) => ({ ...c, id: 'c' + i }));
    decks = {};
    for (const c of cards) { if (!decks[c.deck]) decks[c.deck] = []; decks[c.deck].push(c.id); }
    document.getElementById('totalCardCount').textContent = cards.length;
  } catch(e) {
    console.error(e);
    document.getElementById('homeSubtitle').textContent = 'カード読み込みに失敗しました: ' + (e.message || e);
  }
}

// ============== Spaced Repetition (SM-2 refined, Ebbinghaus-calibrated) ==============
// Design notes:
// - Intervals calibrated to Ebbinghaus forgetting curve + Wozniak SM-2 + modern Anki data.
//   Target retention ≈ 90%. Curve: 1 → 3 → 7 → 15 → 30 → 60 → ... days (roughly doubling).
// - 'again' uses a short relearning step (10 min) rather than wiping all progress.
//   EF is reduced and next graduation starts at 1 day (not instantly).
// - 'easy' graduates faster with a sustained bonus (EF up, extra multiplier).
// - Small random fuzz (±10%) prevents card pile-ups on the same day.
// - EF bounded [1.3, 2.8] to avoid runaway intervals.
const MIN_EF = 1.3;
const MAX_EF = 2.8;
const RELEARN_MIN = 10; // minutes for 'again' relearning step
const EASY_BONUS = 1.3;

function getCardState(id) {
  return state.progress[id] || { ef: 2.5, interval: 0, due: 0, reps: 0, lapses: 0, isNew: true, learning: false };
}

function computeNextInterval(cs, rating) {
  // Returns { interval (days), ef, reps, lapses, learning, relearnMinutes }
  let { ef, interval, reps, lapses } = cs;
  ef = ef || 2.5; interval = interval || 0; reps = reps || 0; lapses = lapses || 0;
  if (rating === 'again') {
    ef = Math.max(MIN_EF, ef - 0.2);
    lapses++;
    // Short relearning step: see again in ~10 min within session, then next true interval = 1 day
    return { interval: 1, ef, reps: 0, lapses, learning: true, relearnMinutes: RELEARN_MIN };
  }
  // Graduation schedule (days) — Ebbinghaus-aligned short-term steps
  let next;
  if (reps === 0) {
    next = rating === 'easy' ? 4 : 1;           // 1st correct: 1d (good) / 4d (easy)
  } else if (reps === 1) {
    next = rating === 'easy' ? 7 : 3;           // 2nd correct: 3d / 7d
  } else if (reps === 2) {
    next = rating === 'easy' ? 14 : 7;          // 3rd correct: 7d / 14d
  } else {
    const mod = rating === 'easy' ? EASY_BONUS : 1;
    next = Math.round(interval * ef * mod);
    // Safety clamp: at least +1 day beyond current interval
    if (next <= interval) next = interval + 1;
  }
  if (rating === 'easy') ef = Math.min(MAX_EF, ef + 0.15);
  // Mild EF uplift on 'good' when streak is forming (reps >= 2) — keeps curve moving
  else if (reps >= 2) ef = Math.min(MAX_EF, ef + 0.02);
  return { interval: next, ef, reps: reps + 1, lapses, learning: false };
}

function applyFuzz(days) {
  if (days < 2) return days;                // no fuzz for short intervals
  const pct = days < 7 ? 0.05 : 0.10;       // smaller fuzz for shorter intervals
  const delta = (Math.random() * 2 - 1) * pct * days;
  return Math.max(1, Math.round(days + delta));
}

function rateCard(id, rating) {
  const now = Date.now();
  let cs = getCardState(id);
  cs.isNew = false;
  const r = computeNextInterval(cs, rating);
  cs.ef = r.ef;
  cs.reps = r.reps;
  cs.lapses = r.lapses;
  cs.learning = r.learning;
  if (r.learning) {
    cs.interval = 0;
    cs.due = now + r.relearnMinutes * 60 * 1000;
  } else {
    const fuzzed = applyFuzz(r.interval);
    cs.interval = fuzzed;
    cs.due = now + fuzzed * DAY_MS;
  }
  state.progress[id] = cs;
  updateStreak();
  saveState();
}

function formatInterval(days) {
  if (days < 1) return '10分';
  if (days === 1) return '1日';
  if (days < 30) return days + '日';
  if (days < 60) return '約1ヶ月';
  if (days < 365) return Math.round(days / 30) + 'ヶ月';
  const years = days / 365;
  return (years < 2 ? years.toFixed(1) : Math.round(years)) + '年';
}

function previewNextInterval(id, rating) {
  const cs = getCardState(id);
  const r = computeNextInterval(cs, rating);
  if (r.learning) return '10分';
  return formatInterval(r.interval);
}
function updateStreak() {
  const today = todayStr();
  if (state.lastStudyDate === today) return;
  if (state.lastStudyDate) {
    const y = new Date(); y.setDate(y.getDate()-1);
    const yStr = y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');
    if (state.lastStudyDate === yStr) state.streak++;
    else state.streak = 1;
  } else {
    state.streak = 1;
  }
  state.lastStudyDate = today;
}

// ============== Due card calculations ==============
function getNewToday(deck) {
  const today = todayStr();
  const n = state.newToday[deck];
  if (!n || n.date !== today) return 0;
  return n.count;
}
function incrementNewToday(deck) {
  const today = todayStr();
  const n = state.newToday[deck];
  if (!n || n.date !== today) state.newToday[deck] = { date: today, count: 1 };
  else n.count++;
}
// Due-by-date forecast (for heatmap and stats).
// Returns { today, buckets: [n0, n1, ..., n6] } where n0 = overdue+today, n1 = tomorrow, ...
function getDueForecast(days = 7) {
  const now = new Date();
  now.setHours(23, 59, 59, 999);     // end of today
  const endOfToday = now.getTime();
  const buckets = new Array(days).fill(0);
  for (const id in state.progress) {
    const cs = state.progress[id];
    if (cs.isNew || cs.learning) continue;
    const dueMs = cs.due;
    if (dueMs <= endOfToday) { buckets[0]++; continue; }
    const diffDays = Math.floor((dueMs - endOfToday) / DAY_MS) + 1;
    if (diffDays >= 0 && diffDays < days) buckets[diffDays]++;
  }
  return { buckets };
}

function getDueCount(deck) {
  const now = Date.now();
  let due = 0;
  for (const id of decks[deck]) {
    const cs = state.progress[id];
    if (cs && !cs.isNew && cs.due <= now) due++;
  }
  // Cap display at reviewLimit so the home number matches what the session will actually show
  return Math.min(due, state.reviewLimit || 100);
}
function getNewCount(deck) {
  const limit = state.newCardLimit;
  const introduced = (state.introducedCards[deck] || []).length;
  const remaining = decks[deck].length - introduced;
  const newTodayDone = getNewToday(deck);
  const todayAllowance = Math.max(0, limit - newTodayDone);
  return Math.min(remaining, todayAllowance);
}
function buildStudyQueue(deck) {
  const now = Date.now();
  const dueIds = [];
  const introducedSet = new Set(state.introducedCards[deck] || []);
  // Due reviews (due + learning cards whose relearn time is up)
  for (const id of decks[deck]) {
    const cs = state.progress[id];
    if (cs && !cs.isNew && cs.due <= now) dueIds.push(id);
  }
  shuffle(dueIds);
  // Enforce daily review cap (total across decks is approximated per-deck cap here;
  // we divide the cap roughly: here we just cap the current deck at reviewLimit)
  const reviewCap = Math.max(10, state.reviewLimit || 100);
  const cappedDue = dueIds.slice(0, reviewCap);
  // New cards up to limit
  const limit = state.newCardLimit;
  const newTodayDone = getNewToday(deck);
  const newAllowance = Math.max(0, limit - newTodayDone);
  const newIds = [];
  for (const id of decks[deck]) {
    if (introducedSet.has(id)) continue;
    if (newIds.length >= newAllowance) break;
    newIds.push(id);
  }
  shuffle(newIds);
  // Interleave: 2 due then 1 new
  const queue = [];
  let di=0, ni=0;
  while (di < cappedDue.length || ni < newIds.length) {
    if (di < cappedDue.length) queue.push(cappedDue[di++]);
    if (di < cappedDue.length) queue.push(cappedDue[di++]);
    if (ni < newIds.length) queue.push(newIds[ni++]);
  }
  return queue;
}
function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i+1)); [arr[i],arr[j]] = [arr[j],arr[i]]; } }

// 7-day schedule heatmap
function renderSchedule() {
  const row = document.getElementById('scheduleRow');
  if (!row) return;
  const forecast = getDueForecast(7);
  const buckets = forecast.buckets;
  const maxVal = Math.max(...buckets, 1);
  const today = new Date();
  const weekday = ['日','月','火','水','木','金','土'];

  // Color level 0..4 based on bucket size relative to max (clamped)
  function level(v) {
    if (v === 0) return 0;
    if (v < 5) return 1;
    if (v < 15) return 2;
    if (v < 40) return 3;
    return 4;
  }

  row.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    const wd = weekday[d.getDay()];
    const day = d.getDate();
    const labelText = i === 0 ? '今日' : (i === 1 ? '明日' : `${wd}`);
    const count = buckets[i] || 0;
    const cell = document.createElement('div');
    cell.className = 'schedule-cell';
    const label = document.createElement('div');
    label.className = 'schedule-label' + (i === 0 ? ' today' : '');
    label.textContent = labelText;
    const bar = document.createElement('div');
    bar.className = 'schedule-bar' + (i === 0 ? ' today-cell' : '');
    bar.dataset.level = String(level(count));
    bar.textContent = count > 0 ? count : '・';
    bar.title = `${d.getMonth()+1}/${day} (${wd}) : ${count}枚`;
    cell.appendChild(label);
    cell.appendChild(bar);
    row.appendChild(cell);
  }
}

// ============== Word gloss (popover + tokenizer) ==============
// GLOSSES is a map { cardId -> [{word, ipa, kana, meaning, nuance}, ...] }.
// We build clickable token spans over the English text so tapping a word
// shows its contextual gloss. Multi-word expressions (e.g. "look forward to")
// are matched first via a longest-phrase-first pass.
const GLOSSES = window.__EMBEDDED_GLOSSES__ || {};

function normalizeForMatch(s) {
  // Lowercase and strip trailing punctuation for matching; keep apostrophes.
  return s.toLowerCase().replace(/^[^a-z0-9']+|[^a-z0-9']+$/g, '');
}

// Tokenize a sentence into an array of { text, space } segments.
// We split on whitespace and keep punctuation attached to words as-is,
// then do matching on a normalized version.
function renderGlossedSentence(container, sentence, entries) {
  container.innerHTML = '';
  container.classList.add('gloss-en');
  if (!entries || entries.length === 0) {
    container.textContent = sentence;
    return;
  }
  // Build a lookup of normalized word/phrase -> entry.
  // Use longest-first matching so "look forward to" beats "look".
  const byKey = {};
  for (const e of entries) byKey[e.word.toLowerCase()] = e;
  const keys = Object.keys(byKey).sort((a, b) => b.length - a.length);

  // Split sentence into tokens while preserving whitespace positions.
  // Token: one word (possibly with attached punctuation).
  const parts = sentence.split(/(\s+)/);  // keeps whitespace as separate elements
  // Normalize each non-whitespace token.
  const tokens = parts.map(p => ({ raw: p, isSpace: /^\s+$/.test(p), norm: /\s/.test(p) ? '' : normalizeForMatch(p) }));

  // Greedy multi-word matching: for each content token, try to match a key
  // that spans 1..N consecutive content tokens (skipping whitespace tokens).
  let i = 0;
  while (i < tokens.length) {
    const t = tokens[i];
    if (t.isSpace) {
      container.appendChild(document.createTextNode(t.raw));
      i++;
      continue;
    }
    // Try progressively longer spans (up to 5 content tokens)
    let matched = null;
    for (let span = 5; span >= 1; span--) {
      // Collect span content tokens
      const collected = [];
      let j = i;
      while (j < tokens.length && collected.length < span) {
        if (!tokens[j].isSpace) collected.push(tokens[j]);
        j++;
      }
      if (collected.length < span) continue;
      const joined = collected.map(c => c.norm).join(' ');
      if (byKey[joined]) {
        matched = { entry: byKey[joined], endIndex: j, span };
        break;
      }
    }
    if (matched) {
      // Build a single span covering all tokens from i..endIndex-1 (including whitespace between)
      const spanEl = document.createElement('span');
      spanEl.className = 'gloss-tok has-gloss';
      const raw = tokens.slice(i, matched.endIndex).map(x => x.raw).join('');
      spanEl.textContent = raw;
      spanEl.dataset.glossKey = matched.entry.word;
      spanEl.addEventListener('click', (ev) => {
        ev.stopPropagation();
        showGlossPopover(matched.entry, spanEl);
      });
      container.appendChild(spanEl);
      i = matched.endIndex;
    } else {
      // No gloss for this word; append as plain token.
      // If we're inside the study card back, we stop propagation on all words so taps don't flip the card.
      const spanEl = document.createElement('span');
      spanEl.className = 'gloss-tok plain';
      spanEl.textContent = t.raw;
      spanEl.addEventListener('click', (ev) => ev.stopPropagation());
      container.appendChild(spanEl);
      i++;
    }
  }
}

let _activeGlossTok = null;
function showGlossPopover(entry, tokEl) {
  if (_activeGlossTok) _activeGlossTok.classList.remove('active');
  _activeGlossTok = tokEl;
  if (tokEl) tokEl.classList.add('active');
  document.getElementById('glossWord').textContent = entry.word;
  document.getElementById('glossIpa').textContent = entry.ipa || '';
  document.getElementById('glossKana').textContent = entry.kana || '';
  document.getElementById('glossMeaning').textContent = entry.meaning || '';
  document.getElementById('glossNuance').textContent = entry.nuance || '';
  document.getElementById('glossBackdrop').classList.add('visible');
  document.getElementById('glossPopover').classList.add('visible');
}
function hideGlossPopover() {
  document.getElementById('glossBackdrop').classList.remove('visible');
  document.getElementById('glossPopover').classList.remove('visible');
  if (_activeGlossTok) _activeGlossTok.classList.remove('active');
  _activeGlossTok = null;
}

// Helper: look up card by {jp, en} — we need ID because embedded cards don't carry IDs.
// The embedded array order == cards.json order, so the ID equals the index.
function cardIndexOf(card) {
  // cards array is the global `cards` variable. Use referenced identity first.
  for (let i = 0; i < cards.length; i++) if (cards[i] === card) return i;
  // Fallback: match by jp+en
  for (let i = 0; i < cards.length; i++) if (cards[i].jp === card.jp && cards[i].en === card.en) return i;
  return -1;
}
function getGlossEntriesForCard(card) {
  const idx = cardIndexOf(card);
  if (idx < 0) return null;
  return GLOSSES[String(idx)] || null;
}

function showNextCard() {
  if (current.index >= current.queue.length) {
    // Session done
    exitStudy();
    showToast(`お疲れさまでした 🎉 ${current.queue.length}枚 学習`);
    return;
  }
  const id = current.queue[current.index];
  current.currentCardId = id;
  current.showingBack = false;
  const card = cards.find(c => c.id === id);
  document.getElementById('cardFront').textContent = card.jp;
  // Render clickable English tokens so learner can tap to see meaning + nuance
  const backEl = document.getElementById('cardBack');
  renderGlossedSentence(backEl, card.en, getGlossEntriesForCard(card));
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('answerBar').classList.remove('visible');
  document.getElementById('flipCta').classList.remove('hidden');
  document.getElementById('studyCounter').textContent = `${current.index + 1} / ${current.queue.length}`;
  const pct = (current.index / current.queue.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  // Preview durations
  document.getElementById('dueGood').textContent = previewNextInterval(id, 'good');
  document.getElementById('dueEasy').textContent = previewNextInterval(id, 'easy');
}

function flipCard() {
  if (current.showingBack) return;
  current.showingBack = true;
  document.getElementById('card').classList.add('flipped');
  document.getElementById('flipCta').classList.add('hidden');
  document.getElementById('answerBar').classList.add('visible');
}

function answerCard(rating) {
  const id = current.currentCardId;
  const cs = getCardState(id);
  const wasNew = !!cs.isNew;
  rateCard(id, rating);
  if (wasNew) {
    if (!state.introducedCards[current.deck]) state.introducedCards[current.deck] = []; state.introducedCards[current.deck].push(id);
    incrementNewToday(current.deck);
  }
  if (rating === 'again') {
    // Re-queue for later in session
    current.queue.push(id);
  }
  current.index++;
  saveState();
  document.getElementById('progressFill').style.width = ((current.index / current.queue.length) * 100) + '%';
  setTimeout(showNextCard, 180);
}

  a.href = url;
  a.download = `flashcard_progress_${todayStr()}.json`;

function importProgress(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (imported && typeof imported === 'object') {
        state = Object.assign(defaultState(), imported);
        saveState();
        renderHome();
        closeSheet();
        showToast('読み込みました');
      }
    } catch(e) { showToast('読み込みに失敗しました'); }
  };
  reader.readAsText(file);
}

  if (!confirm('すべての学習履歴を消去します。よろしいですか？')) return;
  state = defaultState();
  saveState();
  renderHome();
  closeSheet();
  showToast('初期化しました');
}

  initTheme();
  document.getElementById('themeBtn').addEventListener('click', toggleTheme);
  document.getElementById('settingsBtn').addEventListener('click', openSheet);
  document.getElementById('sheetBackdrop').addEventListener('click', closeSheet);
  document.getElementById('reviewLimit').addEventListener('change', (e) => {
    state.reviewLimit = parseInt(e.target.value, 10);
    saveState();
    renderHome();
  });
  document.getElementById('newCardLimit').addEventListener('change', (e) => {
    state.newCardLimit = parseInt(e.target.value, 10);
    saveState();
    renderHome();
  });
  document.getElementById('exportBtn').addEventListener('click', exportProgress);
  document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', (e) => { if (e.target.files[0]) importProgress(e.target.files[0]); });
  document.getElementById('resetBtn').addEventListener('click', resetProgress);

  document.getElementById('card').addEventListener('click', flipCard);
  document.getElementById('flipCta').addEventListener('click', flipCard);
  document.querySelectorAll('.ans-btn').forEach(b => {
    b.addEventListener('click', () => answerCard(b.dataset.rating));
  });

  // Keyboard shortcuts (space=flip, 1/2/3=rate)
  document.addEventListener('keydown', (e) => {
    if (document.getElementById('studyView').classList.contains('hidden')) return;
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      if (!current.showingBack) flipCard();
    } else if (current.showingBack) {
      if (e.key === '1') answerCard('again');
      else if (e.key === '2') answerCard('good');
      else if (e.key === '3') answerCard('easy');
    }
  });

  // Browse view wiring
  document.getElementById('browseEntry').addEventListener('click', enterBrowse);
  // Gloss popover dismiss
  document.getElementById('glossBackdrop').addEventListener('click', hideGlossPopover);
  document.getElementById('glossClose').addEventListener('click', hideGlossPopover);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') hideGlossPopover(); });
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');
  let searchTimer;
  searchInput.addEventListener('input', (e) => {
    browseState.query = e.target.value;
    searchClear.classList.toggle('visible', !!e.target.value);
    clearTimeout(searchTimer);
    searchTimer = setTimeout(renderCardList, 120);
  });
  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    browseState.query = '';
    searchClear.classList.remove('visible');
    renderCardList();
    searchInput.focus();
  });
  document.getElementById('revealAllBtn').addEventListener('click', toggleRevealAll);

  loadCards().then(renderHome);
}
init();

// Register service worker for offline
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
